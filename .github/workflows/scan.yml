name: Ticket Scanner

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: state.json
          key: ticket-watcher-state-${{ github.run_id }}
          restore-keys: ticket-watcher-state-

      - name: Restore logs
        uses: actions/cache@v4
        with:
          path: logs/
          key: ticket-watcher-logs-${{ github.run_id }}
          restore-keys: ticket-watcher-logs-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/index.js
